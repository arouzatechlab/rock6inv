<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Optimization -->
    <title>Contact Us | ROCK6 Research and Development Group</title>
    <meta
      name="description"
      content="Get in touch with ROCK6 Research and Development Group for strategic investment research and R&D consulting."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>Strategic Inquiry</h1>
          <p>Global Research & Development Capital Advisory</p>
        </div>
      </section>

      <section class="container">
        <div class="contact-card">
          <div id="success-message" class="success-banner" role="alert">
            <h2 style="margin-bottom: 10px">Transmission Complete</h2>
            <p>
              Your research consultation request has been queued. A senior
              associate will contact you shortly.
            </p>
          </div>

          <h2 class="section-title" id="form-heading">Consultation Request</h2>

          <form id="contactForm" novalidate>
            <!-- Row 1 -->
            <div class="form-group">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Johnathan Smith"
                required
              />
              <span class="error-msg" id="name-error">Full name required</span>
            </div>

            <div class="form-group">
              <label for="email">Corporate Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="name@company.com"
                required
              />
              <span class="error-msg" id="email-error"
                >Valid email required</span
              >
            </div>

            <!-- Row 2 -->
            <div class="form-group">
              <label for="phno">Contact Number</label>
              <input
                type="tel"
                id="phno"
                name="phno"
                placeholder="10-digit number"
                pattern="[0-9]{10}"
                required
              />
              <span class="error-msg" id="phno-error"
                >10-digit number required</span
              >
            </div>

            <div class="form-group">
              <label for="occupation">Professional Title</label>
              <input
                type="text"
                id="occupation"
                name="occupation"
                placeholder="e.g. Portfolio Manager"
                required
              />
            </div>

            <!-- Row 3 -->
            <div class="form-group">
              <label for="qualification">Academic Level</label>
              <select id="qualification" name="qualification" required>
                <option value="">Select Level</option>
                <option value="Bachelor">Bachelor's Degree</option>
                <option value="Master">Master's Degree</option>
                <option value="PhD">PhD / Doctorate</option>
                <option value="Professional">CFA / CPA / Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="business_field">Industry Vertical</label>
              <input
                type="text"
                id="business_field"
                name="business_field"
                placeholder="e.g. Fintech, AgTech"
                required
              />
            </div>

            <!-- Row 4 -->
            <div class="form-group">
              <label for="blood_group">Emergency Record (Blood Group)</label>
              <select id="blood_group" name="blood_group" required>
                <option value="">Select Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
              </select>
            </div>

            <div class="form-group">
              <label>Gender Identification</label>
              <div class="radio-group">
                <div class="radio-item">
                  <input
                    type="radio"
                    id="male"
                    name="gender"
                    value="Male"
                    required
                  />
                  <label for="male">Male</label>
                </div>
                <div class="radio-item">
                  <input
                    type="radio"
                    id="female"
                    name="gender"
                    value="Female"
                  />
                  <label for="female">Female</label>
                </div>
                <div class="radio-item">
                  <input type="radio" id="other" name="gender" value="Other" />
                  <label for="other">Other</label>
                </div>
              </div>
            </div>

            <!-- Row 5 (Full) -->
            <div class="form-group full-width">
              <label for="address"
                >Primary Residence / Correspondence Address</label
              >
              <textarea
                id="address"
                name="address"
                rows="2"
                placeholder="Full mailing address..."
                required
              ></textarea>
            </div>

            <!-- Row 6 (Full) -->
            <div class="form-group full-width">
              <label for="photo">Identity Verification (Headshot)</label>
              <div class="file-upload-container">
                <input
                  type="file"
                  id="photo"
                  name="photo"
                  accept="image/*"
                  required
                />
                <div id="photo-preview">
                  <span
                    style="color: #ccc; font-size: 0.6rem; text-align: center"
                    >NO IMAGE</span
                  >
                </div>
              </div>
            </div>

            <!-- Row 7 (Full) -->
            <div class="form-group full-width">
              <label for="message">Strategic Objectives & Research Scope</label>
              <textarea
                id="message"
                name="message"
                rows="4"
                placeholder="Briefly outline your investment goals or R&D requirements..."
                required
              ></textarea>
            </div>

            <!-- Row 8 (Full) -->
            <div class="form-group full-width">
              <button type="submit" class="submit-btn" id="submitBtn">
                Initialize Consultation
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("contactForm");
        const photoInput = document.getElementById("photo");
        const photoPreview = document.getElementById("photo-preview");
        const successBanner = document.getElementById("success-message");
        const formHeading = document.getElementById("form-heading");

        // Image Preview
        photoInput.addEventListener("change", function () {
          const file = this.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) =>
              (photoPreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`);
            reader.readAsDataURL(file);
          }
        });

        // Form Submit
        form.addEventListener("submit", function (e) {
          e.preventDefault();

          let isValid = true;
          const formData = new FormData(form);

          // Basic Validation
          const name = formData.get("name");
          const email = formData.get("email");
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

          if (!name.trim()) {
            showError("name", "Name is required");
            isValid = false;
          }
          if (!emailRegex.test(email)) {
            showError("email", "Invalid email");
            isValid = false;
          }

          if (isValid) {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Transmitting...";

            setTimeout(() => {
              form.style.display = "none";
              formHeading.style.display = "none";
              successBanner.style.display = "block";
              window.scrollTo({ top: 0, behavior: "smooth" });
            }, 1500);
          }
        });

        function showError(id, msg) {
          const input = document.getElementById(id);
          const err = document.getElementById(`${id}-error`);
          input.style.borderColor = "var(--accent-red)";
          err.innerText = msg;
          err.style.display = "block";
        }
      });
    </script>
  </body>
</html>
